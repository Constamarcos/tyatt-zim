    width:100%;padding:14px 20px;font-size:1.1em;border:2px solid var(--borda);

  }
  .caixa-pesquisa input:focus{border-color:var(--verde);box-shadow:0 2px 10px rgba(47,125,51,.15)}

  .resultado:hover{border-color:var(--verde)}
  .resultado h3{margin:0 0 4px;color:var(--verde)}
  .resultado .cat{font-size:.78em;color:var(--cinza);text-transform:uppercase;letter-spacing:.5px}
  .resultado p{margin:6px 0 0;font-size:.95em;color:#333}
  mark{background:var(--marca);padding:0 2px;border-radius:2px}

  .info{color:var(--cinza);font-size:.9em;margin:8px 2px 16px}
  .sem-resultados{text-align:center;color:var(--cinza);padding:40px 0}

  .artigo{background:#fff;border:1px solid var(--borda);border-radius:10px;padding:24px 28px}
  .artigo h1{color:var(--verde);margin-top:0}
  .artigo .cat{font-size:.8em;color:var(--cinza);text-transform:uppercase;letter-spacing:.5px}
  .voltar{display:inline-block;margin-bottom:14px;color:var(--verde);cursor:pointer;font-weight:600;background:none;border:none;font-size:1em;padding:0}

// ─── Motor de pesquisa ──────────────────────────────────────────────────────
// Índice invertido construído localmente: cada pesquisa corre no dispositivo,
// sem qualquer ligação à internet.

function normalizar(texto){
  return texto.toLowerCase()
    .normalize("NFD").replace(/[̀-ͯ]/g, "") // remove acentos
    .replace(/[^a-z0-9\s]/g, " ");
}

function tokenizar(texto){
  return normalizar(texto).split(/\s+/).filter(t => t.length > 1);
}

const indice = new Map(); // termo -> Map(idArtigo -> pontuação)

function indexar(artigo){
  const pesos = [[artigo.titulo, 5], [artigo.categoria, 3], [artigo.corpo, 1]];
  for (const [campo, peso] of pesos){
    for (const termo of tokenizar(campo)){
      if (!indice.has(termo)) indice.set(termo, new Map());
      const mapa = indice.get(termo);
      mapa.set(artigo.id, (mapa.get(artigo.id) || 0) + peso);
    }
  }
}

ARTIGOS.forEach(indexar);

// Conteúdo extra opcional (conteudo.json ao lado da página). Se não existir
// ou a página estiver aberta a partir de file://, segue sem ele.
fetch("conteudo.json")
  .then(r => r.ok ? r.json() : [])
  .then(extras => {
    for (const artigo of extras){
      if (!ARTIGOS.some(a => a.id === artigo.id)){
        ARTIGOS.push(artigo);
        indexar(artigo);
      }
    }
  })
  .catch(() => {});

function pesquisar(consulta){
  const termos = tokenizar(consulta);
  if (termos.length === 0) return [];
  const pontuacoes = new Map();

  for (const termo of termos){
    // correspondência exata + por prefixo (pesquisar "malar" encontra "malaria")
    for (const [termoIndexado, docs] of indice){
      if (termoIndexado === termo || termoIndexado.startsWith(termo)){
        const fator = termoIndexado === termo ? 2 : 1;
        for (const [id, peso] of docs){
          pontuacoes.set(id, (pontuacoes.get(id) || 0) + peso * fator);
        }
      }
    }
  }

  return [...pontuacoes.entries()]
    .sort((a, b) => b[1] - a[1])
    .map(([id]) => ARTIGOS.find(a => a.id === id));
}

// ─── Interface ──────────────────────────────────────────────────────────────
const ecraInicial = document.getElementById("ecraInicial");
const conteudo = document.getElementById("conteudo");
const resultados = document.getElementById("resultados");
const campoInicial = document.getElementById("pesquisaInicial");
const campo = document.getElementById("pesquisa");

function realcar(texto, consulta){
  const termos = tokenizar(consulta);
  if (termos.length === 0) return texto;
  const partes = texto.split(/(\s+)/);
  return partes.map(parte => {
    const norm = normalizar(parte).trim();
    return termos.some(t => norm.startsWith(t)) ? "<mark>" + parte + "</mark>" : parte;
  }).join("");
}

function excerto(corpo, consulta){
  const termos = tokenizar(consulta);
  const normCorpo = normalizar(corpo);
  let posicao = 0;
  for (const t of termos){
    const i = normCorpo.indexOf(t);
    if (i >= 0){ posicao = i; break; }
  }
  const inicio = Math.max(0, corpo.lastIndexOf(" ", Math.max(0, posicao - 60)));
  const fim = Math.min(corpo.length, posicao + 180);
  return (inicio > 0 ? "…" : "") + corpo.slice(inicio, fim).trim() + (fim < corpo.length ? "…" : "");
}

function mostrarResultados(consulta){
  if (!consulta.trim()){ irParaInicio(); return; }
  ecraInicial.classList.add("escondido");
  conteudo.classList.remove("escondido");
  if (campo.value !== consulta) campo.value = consulta;

  const lista = pesquisar(consulta);
  if (lista.length === 0){
    resultados.innerHTML = '<div class="sem-resultados">Nenhum resultado para «' + escapar(consulta) + '».<br>Tenta outra palavra ou uma palavra mais curta.</div>';
    return;
  }
  resultados.innerHTML =
    '<div class="info">' + lista.length + (lista.length === 1 ? " resultado" : " resultados") + " — pesquisa feita no teu dispositivo, 0 MB de dados gastos</div>" +
    lista.map(a =>
      '<div class="resultado" onclick="abrirArtigo(\'' + a.id + '\')">' +
        '<div class="cat">' + escapar(a.categoria) + "</div>" +
        "<h3>" + realcar(escapar(a.titulo), consulta) + "</h3>" +
        "<p>" + realcar(escapar(excerto(a.corpo, consulta)), consulta) + "</p>" +
      "</div>"
    ).join("");
}

function abrirArtigo(id){
  const a = ARTIGOS.find(x => x.id === id);
  if (!a) return;
  ecraInicial.classList.add("escondido");
  conteudo.classList.remove("escondido");
  resultados.innerHTML =
    '<button class="voltar" onclick="mostrarResultados(document.getElementById(\'pesquisa\').value)">← Voltar aos resultados</button>' +
    '<div class="artigo">' +
      '<div class="cat">' + escapar(a.categoria) + "</div>" +
      "<h1>" + escapar(a.titulo) + "</h1>" +
      a.corpo.split(/\n+/).map(p => "<p>" + escapar(p) + "</p>").join("") +
    "</div>";
  window.scrollTo(0, 0);
}

function irParaInicio(){
  conteudo.classList.add("escondido");
  ecraInicial.classList.remove("escondido");
  campoInicial.value = "";
  campo.value = "";
  campoInicial.focus();
}

function escapar(texto){
  const div = document.createElement("div");
  div.textContent = texto;
  return div.innerHTML;
}

campoInicial.addEventListener("input", e => mostrarResultados(e.target.value));
campo.addEventListener("input", e => mostrarResultados(e.target.value));

// Sugestões rápidas no ecrã inicial
const SUGESTOES = ["malária", "água potável", "milho", "percentagens", "história de Angola", "poupança", "energia solar"];
document.getElementById("sugestoes").innerHTML = SUGESTOES.map(s =>
  '<button onclick="mostrarResultados(\'' + s + '\')">' + s + "</button>"
).join("");
</script>
